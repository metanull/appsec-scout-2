services:
    app:
        build:
            context: .
            dockerfile: docker/Dockerfile
            args:
                HTTP_PROXY: "${HTTP_PROXY:-}"
                HTTPS_PROXY: "${HTTPS_PROXY:-}"
                NO_PROXY: "${NO_PROXY:-}"
        image: appsec-scout:latest
        depends_on:
            mysql:
                condition: service_healthy
            redis:
                condition: service_started
        ports:
            - "${APP_PORT:-8080}:8080"
        environment:
            HTTP_PROXY: "${HTTP_PROXY:-}"
            HTTPS_PROXY: "${HTTPS_PROXY:-}"
            NO_PROXY: "${NO_PROXY:-}"
            SSL_CERT_FILE: "${SSL_CERT_FILE:-}"
        volumes:
            - ./app-laravel:/var/www/html
            - app_storage:/var/www/html/storage
            - app_vendor:/var/www/html/vendor
            - app_public_build:/var/www/html/public/build
            - app_public_css:/var/www/html/public/css
            - app_public_js:/var/www/html/public/js
            - app_bootstrap_cache:/var/www/html/bootstrap/cache
        healthcheck:
            test: ["CMD-SHELL", "curl -fsS http://localhost:8080/up || exit 1"]
            interval: 30s
            timeout: 5s
            retries: 3

    mysql:
        image: mysql:8.0
        environment:
            MYSQL_ROOT_PASSWORD: "${DB_ROOT_PASSWORD:-rootpassword}"
            MYSQL_DATABASE: "${DB_DATABASE:-appsec_scout}"
            MYSQL_USER: "${DB_USERNAME:-appsec_scout}"
            MYSQL_PASSWORD: "${DB_PASSWORD:-password}"
        volumes:
            - mysql_data:/var/lib/mysql
            - ./docker/mysql-init.sql:/docker-entrypoint-initdb.d/01-test-db.sql:ro
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
            interval: 10s
            timeout: 5s
            retries: 5

    redis:
        image: redis:7-alpine
        volumes:
            - redis_data:/data

    node:
        image: node:22-alpine
        working_dir: /app
        profiles:
            - tools
        environment:
            HTTP_PROXY: "${HTTP_PROXY:-}"
            HTTPS_PROXY: "${HTTPS_PROXY:-}"
            NO_PROXY: "${NO_PROXY:-}"

    claude:
        build:
            context: .
            dockerfile: docker/claude/Dockerfile
            args:
                HTTP_PROXY: "${HTTP_PROXY:-}"
                HTTPS_PROXY: "${HTTPS_PROXY:-}"
                NO_PROXY: "${NO_PROXY:-}"
        image: appsec-scout-claude:latest
        profiles:
            - claude
        volumes:
            - claude_credentials:/home/claude/.claude
        environment:
            HTTP_PROXY: "${HTTP_PROXY:-}"
            HTTPS_PROXY: "${HTTPS_PROXY:-}"
            NO_PROXY: "${NO_PROXY:-}"
            SSL_CERT_FILE: "${SSL_CERT_FILE:-}"
            REPO_URL: "${REPO_URL:-}"
            REPO_BRANCH: "${REPO_BRANCH:-main}"
            GITHUB_TOKEN: "${GITHUB_TOKEN:-}"
            GIT_USER_NAME: "${GIT_USER_NAME:-}"
            GIT_USER_EMAIL: "${GIT_USER_EMAIL:-}"
            CLAUDE_TASK: "${CLAUDE_TASK:-}"
        stdin_open: true
        tty: true

    ops:
        build:
            context: .
            dockerfile: docker/ops/Dockerfile
            args:
                HTTP_PROXY: "${HTTP_PROXY:-}"
                HTTPS_PROXY: "${HTTPS_PROXY:-}"
                NO_PROXY: "${NO_PROXY:-}"
        image: appsec-scout-ops:latest
        profiles:
            - ops
        volumes:
            - claude_credentials:/home/ops/.claude
            - ${SBOM_OUTPUT_DIR:-./output/sbom-scan}:/output
        environment:
            HTTP_PROXY: "${HTTP_PROXY:-}"
            HTTPS_PROXY: "${HTTPS_PROXY:-}"
            NO_PROXY: "${NO_PROXY:-}"
            SSL_CERT_FILE: "${SSL_CERT_FILE:-}"
            REPO_URL: "${REPO_URL:-}"
            REPO_BRANCH: "${REPO_BRANCH:-main}"
            GITHUB_TOKEN: "${GITHUB_TOKEN:-}"
            GIT_USER_NAME: "${GIT_USER_NAME:-}"
            GIT_USER_EMAIL: "${GIT_USER_EMAIL:-}"
            AZDO_ORG: "${AZDO_ORG:-}"
            AZDO_PAT: "${AZDO_PAT:-}"
            AZDO_PROJECT_FILTER: "${AZDO_PROJECT_FILTER:-}"
            AZDO_REPO_FILTER: "${AZDO_REPO_FILTER:-}"
        stdin_open: true
        tty: true

volumes:
    mysql_data:
    redis_data:
    app_storage:
    app_vendor:
    app_public_build:
    app_public_css:
    app_public_js:
    app_bootstrap_cache:
    claude_credentials:
