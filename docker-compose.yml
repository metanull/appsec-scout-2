services:
    app:
        build:
            context: .
            dockerfile: docker/Dockerfile
            args:
                HTTP_PROXY: "${HTTP_PROXY:-}"
                HTTPS_PROXY: "${HTTPS_PROXY:-}"
                NO_PROXY: "${NO_PROXY:-}"
        image: appsec-scout:latest
        depends_on:
            mysql:
                condition: service_healthy
            redis:
                condition: service_started
        ports:
            - "${APP_PORT:-8080}:8080"
        environment:
            HTTP_PROXY: "${HTTP_PROXY:-}"
            HTTPS_PROXY: "${HTTPS_PROXY:-}"
            NO_PROXY: "${NO_PROXY:-}"
            SSL_CERT_FILE: "${SSL_CERT_FILE:-}"
        volumes:
            - ./app-laravel:/var/www/html
            - app_storage:/var/www/html/storage
            - app_vendor:/var/www/html/vendor
            - app_public_build:/var/www/html/public/build
            - app_public_css:/var/www/html/public/css
            - app_public_js:/var/www/html/public/js
            - app_bootstrap_cache:/var/www/html/bootstrap/cache
            - ${SBOM_OUTPUT_DIR:-./output/sbom-scan}:/var/www/html/sbom-import:ro
        healthcheck:
            test: ["CMD-SHELL", "curl -fsS http://localhost:8080/up || exit 1"]
            interval: 30s
            timeout: 5s
            retries: 3

    mysql:
        image: mysql:8.0
        environment:
            MYSQL_ROOT_PASSWORD: "${DB_ROOT_PASSWORD:-rootpassword}"
            MYSQL_DATABASE: "${DB_DATABASE:-appsec_scout}"
            MYSQL_USER: "${DB_USERNAME:-appsec_scout}"
            MYSQL_PASSWORD: "${DB_PASSWORD:-password}"
        volumes:
            - mysql_data:/var/lib/mysql
            - ./docker/mysql-init.sql:/docker-entrypoint-initdb.d/01-test-db.sql:ro
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
            interval: 10s
            timeout: 5s
            retries: 5

    redis:
        image: redis:7-alpine
        volumes:
            - redis_data:/data

    dependencytrack-postgres:
        image: postgres:16-alpine
        environment:
            POSTGRES_DB: "${DTRACK_DB_DATABASE:-dtrack}"
            POSTGRES_USER: "${DTRACK_DB_USERNAME:-dtrack}"
            POSTGRES_PASSWORD: "${DTRACK_DB_PASSWORD:-dtrack}"
        volumes:
            - dependencytrack_postgres_data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${DTRACK_DB_USERNAME:-dtrack}"]
            interval: 10s
            timeout: 5s
            retries: 5

    # Extends dependencytrack-apiserver's Java truststore with any corporate/TLS-inspecting
    # proxy CA exported by Export-HostCertificates (scripts/lib/Certificates.psm1), per
    # https://docs.dependencytrack.org/getting-started/internal-ca/ — the apiserver's JRE
    # (java's own cacerts, not the OS trust store) otherwise fails outbound TLS with
    # sun.security.provider.certpath.SunCertPathBuilderException / X509TrustManagerImpl errors.
    # Builds a copy of the image's own cacerts plus any exported certs into a shared volume;
    # dependencytrack-apiserver then points -Djavax.net.ssl.trustStore at it via
    # EXTRA_JAVA_OPTIONS instead of replacing the JRE's cacerts file directly — Docker can
    # only cleanly bind/volume-mount a directory onto a missing host/volume path, never a
    # single file (confirmed: it silently creates a directory there instead), so the shared
    # path has to be a directory containing the file, not the file itself. A no-op merge
    # (just the base cacerts, unchanged) when there's no corporate CA present (e.g. home).
    dependencytrack-cacerts-init:
        image: dependencytrack/apiserver:latest
        # The image's default USER 1000 can't write into a fresh named volume (root-owned
        # until something chowns it). Safe here since this container only copies/imports
        # certs and exits — dependencytrack-apiserver itself keeps running as UID 1000.
        user: root
        entrypoint: ["/bin/sh", "-c"]
        command:
            - |
              set -e
              cp /opt/java/openjdk/lib/security/cacerts /output/cacerts
              for cert in /host-certs/[0-9][0-9][0-9][0-9]-*.crt; do
                  [ -f "$$cert" ] || continue
                  alias=$$(basename "$$cert" .crt)
                  keytool -keystore /output/cacerts -storepass changeit \
                      -noprompt -trustcacerts -importcert -alias "$$alias" -file "$$cert"
              done
        volumes:
            - ./.docker/certs:/host-certs:ro
            - dependencytrack_cacerts:/output

    dependencytrack-apiserver:
        image: dependencytrack/apiserver:latest
        depends_on:
            dependencytrack-postgres:
                condition: service_healthy
            dependencytrack-cacerts-init:
                condition: service_completed_successfully
        environment:
            ALPINE_DATABASE_MODE: external
            ALPINE_DATABASE_URL: "jdbc:postgresql://dependencytrack-postgres:5432/${DTRACK_DB_DATABASE:-dtrack}"
            ALPINE_DATABASE_DRIVER: org.postgresql.Driver
            ALPINE_DATABASE_USERNAME: "${DTRACK_DB_USERNAME:-dtrack}"
            ALPINE_DATABASE_PASSWORD: "${DTRACK_DB_PASSWORD:-dtrack}"
            EXTRA_JAVA_OPTIONS: "-Djavax.net.ssl.trustStore=/opt/appsec-scout-certs/cacerts -Djavax.net.ssl.trustStorePassword=changeit"
        ports:
            - "${DTRACK_API_PORT:-8091}:8080"
        volumes:
            - dependencytrack_data:/data
            - dependencytrack_cacerts:/opt/appsec-scout-certs:ro

    dependencytrack-frontend:
        image: dependencytrack/frontend:latest
        depends_on:
            - dependencytrack-apiserver
        environment:
            API_BASE_URL: "${DTRACK_API_BASE_URL:-http://localhost:8091}"
        ports:
            - "${DTRACK_FRONTEND_PORT:-8090}:8080"

    # Generates /var/lib/trivy-token/token once (if absent) using the appsec-scout image's own
    # PHP, then exits. trivy-server and dependencytrack-bootstrap both mount the resulting
    # trivy_token volume read-only, so the shared secret between them is provisioned entirely
    # inside the stack — no env var or manual step required on any entry point.
    trivy-token-init:
        image: appsec-scout:latest
        entrypoint: ["php", "-r"]
        command:
            - "if (!is_file('/var/lib/trivy-token/token')) { file_put_contents('/var/lib/trivy-token/token', bin2hex(random_bytes(24))); }"
        volumes:
            - trivy_token:/var/lib/trivy-token

    # Self-hosted Trivy vulnerability database server for Dependency-Track's Trivy analyzer —
    # avoids external accounts and NVD mirror wait times. Not exposed on the host; only
    # dependencytrack-apiserver talks to it, over the Compose network.
    trivy-server:
        image: aquasec/trivy:latest
        depends_on:
            trivy-token-init:
                condition: service_completed_successfully
        environment:
            HTTP_PROXY: "${HTTP_PROXY:-}"
            HTTPS_PROXY: "${HTTPS_PROXY:-}"
            NO_PROXY: "${NO_PROXY:-}"
        entrypoint: ["/bin/sh", "-c"]
        command:
            # trivy-server is an unmodified upstream image, so it never gets the corporate/
            # TLS-inspecting proxy CA that docker/Dockerfile bakes into appsec-scout:latest via
            # update-ca-certificates — without this it fails to fetch the vulnerability DB with
            # "X509 certificate signed by unknown authority". Trust any certs
            # Export-HostCertificates exported (scripts/lib/Certificates.psm1) the same way,
            # just at runtime instead of build time; a no-op merge on a machine with no
            # corporate CA (e.g. a home machine).
            - |
              if [ -n "$$(ls -A /usr/local/share/ca-certificates/appsec-scout 2>/dev/null)" ]; then
                  update-ca-certificates
              fi
              exec trivy server --listen 0.0.0.0:4954 --token "$$(cat /var/lib/trivy-token/token)"
        volumes:
            - trivy_token:/var/lib/trivy-token:ro
            - trivy_data:/root/.cache
            - ./.docker/certs:/usr/local/share/ca-certificates/appsec-scout:ro

    dependencytrack-bootstrap:
        image: appsec-scout:latest
        depends_on:
            app:
                condition: service_healthy
            dependencytrack-apiserver:
                condition: service_healthy
            trivy-server:
                condition: service_started
        environment:
            HTTP_PROXY: "${HTTP_PROXY:-}"
            HTTPS_PROXY: "${HTTPS_PROXY:-}"
            NO_PROXY: "${NO_PROXY:-}"
            SSL_CERT_FILE: "${SSL_CERT_FILE:-}"
        volumes:
            - ./app-laravel:/var/www/html
            - app_storage:/var/www/html/storage
            - app_vendor:/var/www/html/vendor
            - app_public_build:/var/www/html/public/build
            - app_public_css:/var/www/html/public/css
            - app_public_js:/var/www/html/public/js
            - app_bootstrap_cache:/var/www/html/bootstrap/cache
            - trivy_token:/var/lib/trivy-token:ro
        command:
            - php
            - artisan
            - dependencytrack:bootstrap
            - --base-url=${DTRACK_INTERNAL_BASE_URL:-http://dependencytrack-apiserver:8080}
            - --admin-username=${DTRACK_ADMIN_USERNAME:-admin}
            - --admin-password=${DTRACK_ADMIN_PASSWORD:-admin}
            - --team=${DTRACK_TEAM:-Automation}
            - --trivy-base-url=${TRIVY_SERVER_URL:-http://trivy-server:4954}
            - --trivy-token-file=/var/lib/trivy-token/token

    node:
        image: node:22-alpine
        working_dir: /app
        profiles:
            - tools
        environment:
            HTTP_PROXY: "${HTTP_PROXY:-}"
            HTTPS_PROXY: "${HTTPS_PROXY:-}"
            NO_PROXY: "${NO_PROXY:-}"

    claude:
        build:
            context: .
            dockerfile: docker/claude/Dockerfile
            args:
                HTTP_PROXY: "${HTTP_PROXY:-}"
                HTTPS_PROXY: "${HTTPS_PROXY:-}"
                NO_PROXY: "${NO_PROXY:-}"
        image: appsec-scout-claude:latest
        profiles:
            - claude
        volumes:
            - claude_credentials:/home/claude/.claude
        environment:
            HTTP_PROXY: "${HTTP_PROXY:-}"
            HTTPS_PROXY: "${HTTPS_PROXY:-}"
            NO_PROXY: "${NO_PROXY:-}"
            SSL_CERT_FILE: "${SSL_CERT_FILE:-}"
            REPO_URL: "${REPO_URL:-}"
            REPO_BRANCH: "${REPO_BRANCH:-main}"
            GITHUB_TOKEN: "${GITHUB_TOKEN:-}"
            GIT_USER_NAME: "${GIT_USER_NAME:-}"
            GIT_USER_EMAIL: "${GIT_USER_EMAIL:-}"
            CLAUDE_TASK: "${CLAUDE_TASK:-}"
        stdin_open: true
        tty: true

    ops:
        build:
            context: .
            dockerfile: docker/ops/Dockerfile
            args:
                HTTP_PROXY: "${HTTP_PROXY:-}"
                HTTPS_PROXY: "${HTTPS_PROXY:-}"
                NO_PROXY: "${NO_PROXY:-}"
        image: appsec-scout-ops:latest
        profiles:
            - ops
        volumes:
            - claude_credentials:/home/ops/.claude
            - ${SBOM_OUTPUT_DIR:-./output/sbom-scan}:/output
            - trivy_token:/var/lib/trivy-token:ro
        environment:
            HTTP_PROXY: "${HTTP_PROXY:-}"
            HTTPS_PROXY: "${HTTPS_PROXY:-}"
            NO_PROXY: "${NO_PROXY:-}"
            SSL_CERT_FILE: "${SSL_CERT_FILE:-}"
            REPO_URL: "${REPO_URL:-}"
            REPO_BRANCH: "${REPO_BRANCH:-main}"
            GITHUB_TOKEN: "${GITHUB_TOKEN:-}"
            GIT_USER_NAME: "${GIT_USER_NAME:-}"
            GIT_USER_EMAIL: "${GIT_USER_EMAIL:-}"
            AZDO_ORG: "${AZDO_ORG:-}"
            AZDO_PAT: "${AZDO_PAT:-}"
            AZDO_PROJECT_FILTER: "${AZDO_PROJECT_FILTER:-}"
            AZDO_REPO_FILTER: "${AZDO_REPO_FILTER:-}"
            TRIVY_SERVER_URL: "${TRIVY_SERVER_URL:-http://trivy-server:4954}"
        stdin_open: true
        tty: true

volumes:
    mysql_data:
    redis_data:
    app_storage:
    app_vendor:
    app_public_build:
    app_public_css:
    app_public_js:
    app_bootstrap_cache:
    claude_credentials:
    dependencytrack_postgres_data:
    dependencytrack_data:
    dependencytrack_cacerts:
    trivy_token:
    trivy_data:
