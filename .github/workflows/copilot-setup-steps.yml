name: "Copilot Setup Steps"

# Run automatically when this file changes to validate the setup steps,
# and allow manual testing from the repository's Actions tab.
on:
    workflow_dispatch:
    push:
        paths:
            - .github/workflows/copilot-setup-steps.yml
    pull_request:
        paths:
            - .github/workflows/copilot-setup-steps.yml

jobs:
    # The job MUST be called `copilot-setup-steps` or it will not be picked up by Copilot.
    copilot-setup-steps:
        runs-on: ubuntu-latest

        permissions:
            contents: read

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Build Docker development image
              run: APP_BUILD_TARGET=dev docker compose build app

            - name: Verify container-owned tools
              run: |
                  APP_BUILD_TARGET=dev docker compose run --rm app trivy --version
                  APP_BUILD_TARGET=dev docker compose run --rm app java -version
                  APP_BUILD_TARGET=dev docker compose run --rm app git --version
                  APP_BUILD_TARGET=dev docker compose run --rm app test -f /opt/bfg/bfg.jar
