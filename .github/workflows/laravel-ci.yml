name: Laravel CI

on:
  pull_request:
    branches: ["**"]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Prepare Docker environment
        run: |
          cp app-laravel/.env.example .env
          printf '%s\n' \
            'APP_BUILD_TARGET=dev' \
            'APP_ENV=testing' \
            'APP_KEY=base64:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=' \
            'APP_DEBUG=false' \
            'DB_DATABASE=appsec_scout_test' \
            'DB_PASSWORD=password' \
            'CACHE_STORE=redis' \
            'SESSION_DRIVER=redis' \
            'QUEUE_CONNECTION=redis' \
            >> .env

      - name: Build Docker development image
        run: docker compose build app

      - name: Start backing services
        run: docker compose up -d mysql redis

      - name: Lint (Pint)
        run: docker compose run --rm app vendor/bin/pint --test

      - name: Static analysis (PHPStan)
        run: docker compose run --rm app vendor/bin/phpstan analyse --no-progress --memory-limit=512M

      - name: Test (Pest)
        run: docker compose run --rm app vendor/bin/pest --no-coverage
